<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stronghold Brand Toolkit - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0B1D2E;
      --gold: #C4A35A;
      --steel: #1B4965;
      --white: #FFFFFF;
      --off-white: #F5F6F8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-container {
      background: var(--white);
      border-radius: 16px;
      padding: 48px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-text {
      font-size: 32px;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.02em;
    }
    .logo-shield {
      display: inline-block;
      width: 48px;
      height: 48px;
      background: var(--gold);
      border-radius: 8px;
      margin-bottom: 12px;
      position: relative;
    }
    .logo-shield::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 28px;
      border: 3px solid var(--navy);
      border-radius: 4px 4px 12px 12px;
    }
    .form-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--navy);
      text-align: center;
      margin-bottom: 8px;
    }
    .form-subtitle {
      font-size: 14px;
      color: #6B7280;
      text-align: center;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #E5E7EB;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--gold);
    }
    .form-button {
      width: 100%;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
      background: var(--gold);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }
    .form-button:hover {
      background: #B39350;
    }
    .error-message {
      display: none;
      background: #FEE2E2;
      color: #991B1B;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
    }
    .error-message.show {
      display: block;
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 32px 24px;
      }
      .logo-text {
        font-size: 28px;
      }
      .form-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-shield"></div>
      <div class="logo-text">STRONGHOLD</div>
    </div>
    
    <h1 class="form-title">Brand Toolkit</h1>
    <p class="form-subtitle">Enter password to access</p>
    
    <div id="error" class="error-message">
      Incorrect password. Please try again.
    </div>
    
    <form id="loginForm" onsubmit="checkPassword(event)">
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="Enter password"
          required
          autofocus
        >
      </div>
      
      <button type="submit" class="form-button">
        Access Toolkit
      </button>
    </form>
  </div>

  <script>
    function checkPassword(event) {
      event.preventDefault();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      
      // Password: Stronghold2026
      if (password === 'Stronghold2026') {
        // Store login status
        sessionStorage.setItem('stronghold_auth', 'true');
        // Redirect to toolkit
        window.location.href = 'index.html';
      } else {
        // Show error
        errorDiv.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        
        // Hide error after 3 seconds
        setTimeout(() => {
          errorDiv.classList.remove('show');
        }, 3000);
      }
    }
  </script>
</body>
</html>
